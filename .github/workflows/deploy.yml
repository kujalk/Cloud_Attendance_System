name: Deploy to AWS

# ── Triggers ──────────────────────────────────────────────────────────────────
# • Manual dispatch only → choose scope (push trigger disabled)
on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Deployment scope'
        required: true
        default: 'all'
        type: choice
        options:
          - all          # CloudFormation + EB app (default)
          - infra-only   # CloudFormation stack only
          - app-only     # EB app version only (stack must already exist)

# ── Required GitHub Secrets ────────────────────────────────────────────────────
# AWS_ACCESS_KEY_ID        IAM access key  (needs CF + EB + S3 + IAM + EC2 + RDS perms)
# AWS_SECRET_ACCESS_KEY    IAM secret key
# AWS_REGION               e.g. us-east-1
# DB_PASSWORD              Aurora master password (≥ 8 chars)
# DJANGO_SECRET_KEY        50-char random string
#
# Optional — email notifications:
# EMAIL_HOST               smtp.gmail.com
# EMAIL_PORT               587
# EMAIL_USE_TLS            True
# EMAIL_HOST_USER          your@gmail.com
# EMAIL_HOST_PASSWORD      16-char Gmail App Password
# DEFAULT_FROM_EMAIL       CloudAttend <your@gmail.com>
# ATTENDANCE_ADMIN_EMAILS  comma-separated admin emails to CC
# SITE_URL                 https://your-app.elasticbeanstalk.com

env:
  APP_NAME:   CloudAttendanceSystem
  ENV_NAME:   CloudAttendanceSystem-production
  STACK_NAME: cloudattend-production

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. AWS credentials ───────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. Probe what already exists ─────────────────────────────────────────
      - name: Check existing AWS resources
        id: probe
        run: |
          # ── CloudFormation stack ──
          CF_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "cf_status=$CF_STATUS" | tee -a "$GITHUB_OUTPUT"

          # A ROLLBACK_COMPLETE stack cannot be updated — must be deleted first
          if [[ "$CF_STATUS" == "ROLLBACK_COMPLETE" ]]; then
            echo "Stack is in ROLLBACK_COMPLETE — deleting before recreating..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME"
            CF_STATUS="DOES_NOT_EXIST"
            echo "cf_status=DOES_NOT_EXIST" >> "$GITHUB_OUTPUT"
          fi

          # ── EB Environment — resolve name from CF outputs (if stack exists) ──
          CF_ENV=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='EBEnvironmentName'].OutputValue" \
            --output text 2>/dev/null || echo "")
          if [ -n "$CF_ENV" ] && [ "$CF_ENV" != "None" ]; then
            EB_ENV_STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name "$APP_NAME" \
              --environment-names "$CF_ENV" \
              --query "Environments[?Status!='Terminated'].Status|[0]" \
              --output text 2>/dev/null || echo "None")
            echo "Resolved EB environment from CF outputs: $CF_ENV ($EB_ENV_STATUS)"
          else
            CF_ENV="(stack not yet deployed)"
            EB_ENV_STATUS="None"
          fi
          echo "eb_env_status=$EB_ENV_STATUS" | tee -a "$GITHUB_OUTPUT"

          # ── Resolve EB platform (use secret, or auto-detect latest Python 3.12) ──
          if [ -n "${{ secrets.EB_PLATFORM }}" ]; then
            PLATFORM="${{ secrets.EB_PLATFORM }}"
          else
            PLATFORM=$(aws elasticbeanstalk list-available-solution-stacks \
              --query "SolutionStacks[?contains(@,'Python 3.12')]|[0]" \
              --output text)
            echo "Auto-detected EB platform: $PLATFORM"
          fi
          echo "eb_platform=$PLATFORM" | tee -a "$GITHUB_OUTPUT"

          # ── Resolve Aurora MySQL 8.0 engine version available in this region ──
          # Sorts all 8.0.mysql_aurora.* versions and picks the latest one.
          AURORA_VERSION=$(aws rds describe-db-engine-versions \
            --engine aurora-mysql \
            --query "sort_by(DBEngineVersions[?starts_with(EngineVersion,'8.0')], &EngineVersion)[-1].EngineVersion" \
            --output text 2>/dev/null || echo "")
          # Fall back to a broadly available version if detection fails
          if [ -z "$AURORA_VERSION" ] || [ "$AURORA_VERSION" = "None" ]; then
            AURORA_VERSION="8.0.mysql_aurora.3.04.0"
            echo "Aurora version detection failed — using fallback: $AURORA_VERSION"
          else
            echo "Auto-detected Aurora engine version: $AURORA_VERSION"
          fi
          echo "aurora_version=$AURORA_VERSION" | tee -a "$GITHUB_OUTPUT"

          # ── Summary ──
          echo "### Resource probe" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CloudFormation stack \`$STACK_NAME\` | \`$CF_STATUS\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| EB Environment \`$CF_ENV\` | $EB_ENV_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| EB Platform | $PLATFORM |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Aurora Engine Version | $AURORA_VERSION |" >> "$GITHUB_STEP_SUMMARY"

      # ── 4. Deploy / update CloudFormation stack ──────────────────────────────
      #    `aws cloudformation deploy` is idempotent:
      #      • Stack does not exist → CREATE_COMPLETE
      #      • Stack exists, template/params changed → UPDATE_COMPLETE
      #      • Stack exists, nothing changed → no-op (--no-fail-on-empty-changeset)
      #    This step also creates the EB Application + Environment on first run.
      - name: Deploy CloudFormation stack (create or update)
        if: |
          github.event.inputs.scope != 'app-only'
        run: |
          echo "CF status before deploy: ${{ steps.probe.outputs.cf_status }}"
          aws cloudformation deploy \
            --template-file cloudformation/template.yaml \
            --stack-name "$STACK_NAME" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ApplicationName="$APP_NAME" \
              EnvironmentName=production \
              SolutionStackName="${{ steps.probe.outputs.eb_platform }}" \
              AuroraEngineVersion="${{ steps.probe.outputs.aurora_version }}" \
              DBPassword="${{ secrets.DB_PASSWORD }}" \
              DjangoSecretKey="${{ secrets.DJANGO_SECRET_KEY }}" \
              AdminUsername="${{ secrets.ADMIN_USERNAME }}" \
              AdminEmail="${{ secrets.ADMIN_EMAIL }}" \
              AdminPassword="${{ secrets.ADMIN_PASSWORD }}"

          # Show outputs
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs" \
            --output table

      # ── 5. Package the Django application ────────────────────────────────────
      - name: Create deployment package
        if: github.event.inputs.scope != 'infra-only'
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "venv/*" ".venv/*" "env/*" "virtual/*" \
            --exclude ".env" \
            --exclude "db.sqlite3" \
            --exclude "media/*" "staticfiles/*" \
            --exclude "__pycache__/*" "*.pyc" "*.pyo" \
            --exclude "docs/generate_diagram.py" \
            --exclude "docs/*.png" "docs/*.svg"
          echo "Package size: $(du -sh deploy.zip | cut -f1)"

      # ── 6. Ensure S3 deployment bucket exists ────────────────────────────────
      - name: Ensure S3 bucket exists
        if: github.event.inputs.scope != 'infra-only'
        run: |
          S3_BUCKET="cloudattend-deployments-${{ github.repository_owner }}"
          echo "S3_BUCKET=$S3_BUCKET" >> "$GITHUB_ENV"

          if aws s3api head-bucket --bucket "$S3_BUCKET" >/dev/null 2>&1; then
            echo "Bucket $S3_BUCKET already exists"
          else
            echo "Creating bucket $S3_BUCKET in ${{ secrets.AWS_REGION }}"
            if [ "${{ secrets.AWS_REGION }}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$S3_BUCKET" --region us-east-1
            else
              aws s3api create-bucket --bucket "$S3_BUCKET" \
                --region "${{ secrets.AWS_REGION }}" \
                --create-bucket-configuration LocationConstraint="${{ secrets.AWS_REGION }}"
            fi
          fi
          # Block public access and enable versioning
          aws s3api put-public-access-block --bucket "$S3_BUCKET" \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          aws s3api put-bucket-versioning --bucket "$S3_BUCKET" \
            --versioning-configuration Status=Enabled

      # ── 7. Upload bundle and create EB application version ───────────────────
      - name: Upload bundle and create EB version
        if: github.event.inputs.scope != 'infra-only'
        id: version
        run: |
          VERSION_LABEL="v-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::8}"
          echo "VERSION_LABEL=$VERSION_LABEL" >> "$GITHUB_ENV"
          echo "label=$VERSION_LABEL" >> "$GITHUB_OUTPUT"

          aws s3 cp deploy.zip "s3://$S3_BUCKET/$VERSION_LABEL.zip"

          # CF creates the EB application; --auto-create-application handles any
          # edge-case where it's missing (e.g. app-only scope on a fresh account).
          # We no longer call create-application explicitly — it would fail with
          # "already exists" when CF ran first in the same pipeline.
          aws elasticbeanstalk create-application-version \
            --application-name "$APP_NAME" \
            --version-label "$VERSION_LABEL" \
            --source-bundle "S3Bucket=$S3_BUCKET,S3Key=$VERSION_LABEL.zip" \
            --auto-create-application

      # ── 8. Deploy version to EB environment ──────────────────────────────────
      - name: Deploy to EB environment (create or update)
        if: github.event.inputs.scope != 'infra-only'
        run: |
          # Always resolve env name from CF outputs — never use the hardcoded ENV_NAME.
          # CF may have replaced the environment (e.g. when CNAMEPrefix was added),
          # so the probe-time name can be stale by the time we reach this step.
          ACTUAL_ENV=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='EBEnvironmentName'].OutputValue" \
            --output text 2>/dev/null || echo "")

          if [ -z "$ACTUAL_ENV" ] || [ "$ACTUAL_ENV" = "None" ]; then
            echo "ERROR: Could not resolve EB environment name from CF outputs."
            echo "Ensure the CloudFormation stack deployed successfully (scope=all)."
            exit 1
          fi

          echo "Deploying version $VERSION_LABEL to environment $ACTUAL_ENV..."
          aws elasticbeanstalk update-environment \
            --application-name "$APP_NAME" \
            --environment-name "$ACTUAL_ENV" \
            --version-label "$VERSION_LABEL"

      # ── 9. Wait for EB environment to become Ready ───────────────────────────
      - name: Wait for EB environment Ready
        if: github.event.inputs.scope != 'infra-only'
        run: |
          # Resolve actual env name (CF may have named it differently)
          ACTUAL_ENV=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='EBEnvironmentName'].OutputValue" \
            --output text 2>/dev/null || echo "$ENV_NAME")

          echo "Waiting for $ACTUAL_ENV to become Ready (timeout: 20 min)..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "$APP_NAME" \
            --environment-names "$ACTUAL_ENV"

          # Verify health
          HEALTH=$(aws elasticbeanstalk describe-environments \
            --application-name "$APP_NAME" \
            --environment-names "$ACTUAL_ENV" \
            --query "Environments[0].Health" \
            --output text)
          echo "Environment health: $HEALTH"
          [[ "$HEALTH" == "Green" || "$HEALTH" == "Ok" ]] || \
            echo "Warning: environment health is $HEALTH — check EB console"

      # ── 10. Push email env vars to EB (if secrets are configured) ─────────────
      - name: Configure email in EB environment
        if: |
          github.event.inputs.scope != 'infra-only' &&
          env.EMAIL_HOST_SECRET != ''
        env:
          EMAIL_HOST_SECRET: ${{ secrets.EMAIL_HOST }}
        run: |
          ACTUAL_ENV=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='EBEnvironmentName'].OutputValue" \
            --output text 2>/dev/null || echo "$ENV_NAME")

          # SITE_URL: use secret if provided, otherwise auto-detect from EB CNAME
          # (EndpointURL returns the EC2 IP for SingleInstance — use CNAME instead)
          SITE_URL_VALUE="${{ secrets.SITE_URL }}"
          if [ -z "$SITE_URL_VALUE" ]; then
            EB_CNAME=$(aws elasticbeanstalk describe-environments \
              --application-name "$APP_NAME" \
              --environment-names "$ACTUAL_ENV" \
              --query "Environments[0].CNAME" \
              --output text 2>/dev/null || echo "")
            if [ -n "$EB_CNAME" ] && [ "$EB_CNAME" != "None" ]; then
              SITE_URL_VALUE="http://$EB_CNAME"
            fi
            echo "SITE_URL secret not set — auto-detected from EB CNAME: $SITE_URL_VALUE"
          fi

          aws elasticbeanstalk update-environment \
            --application-name "$APP_NAME" \
            --environment-name "$ACTUAL_ENV" \
            --option-settings \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=EMAIL_HOST,Value=${{ secrets.EMAIL_HOST }}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=EMAIL_PORT,Value=${{ secrets.EMAIL_PORT }}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=EMAIL_USE_TLS,Value=${{ secrets.EMAIL_USE_TLS }}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=EMAIL_HOST_USER,Value=${{ secrets.EMAIL_HOST_USER }}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=EMAIL_HOST_PASSWORD,Value=${{ secrets.EMAIL_HOST_PASSWORD }}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=DEFAULT_FROM_EMAIL,Value=${{ secrets.DEFAULT_FROM_EMAIL }}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=ATTENDANCE_ADMIN_EMAILS,Value=${{ secrets.ATTENDANCE_ADMIN_EMAILS }}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=SITE_URL,Value=$SITE_URL_VALUE"

          echo "Email settings applied to EB — waiting for env update..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "$APP_NAME" \
            --environment-names "$ACTUAL_ENV"

      # ── 11. Deployment summary ────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          # Use EB CNAME (not CF ApplicationURL which returns EC2 IP for SingleInstance)
          ACTUAL_ENV=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='EBEnvironmentName'].OutputValue" \
            --output text 2>/dev/null || echo "$ENV_NAME")
          EB_CNAME=$(aws elasticbeanstalk describe-environments \
            --application-name "$APP_NAME" \
            --environment-names "$ACTUAL_ENV" \
            --query "Environments[0].CNAME" \
            --output text 2>/dev/null || echo "")
          APP_URL=$( [ -n "$EB_CNAME" ] && [ "$EB_CNAME" != "None" ] \
            && echo "http://$EB_CNAME" \
            || echo "Stack not found" )

          AURORA=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='AuroraEndpoint'].OutputValue" \
            --output text 2>/dev/null || echo "—")

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Deployment result" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App URL** | $APP_URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | ${VERSION_LABEL:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Aurora endpoint** | $AURORA |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA::8}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **One-time post-deploy step:** SSH into EB and run \`python manage.py createsuperuser\`" \
            >> "$GITHUB_STEP_SUMMARY"
